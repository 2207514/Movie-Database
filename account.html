<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Movie Database</title>
    <link rel="stylesheet" href="CSS/resize.css">
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/nav.css">
    <link rel="stylesheet" href="CSS/account.css">
</head>
<body>
    <!-- Modal Overlay -->
    <div class="modal-overlay" id="accountModal">
        <button class="close-btn" onclick="closeAccountModal()">×</button>
        
        <div class="account-container">
            <div class="account-header">
                <h1>🎬 Movie Database</h1>
                <p>Your Gateway to Movies</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Tab -->
            <div id="login" class="tab-content active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-group remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" style="margin: 0;">Remember me</label>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
                <div class="form-footer">
                    <p>Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></p>
                    <p><a href="#">Forgot Password?</a></p>
                </div>
            </div>

            <!-- Sign Up Tab -->
            <div id="signup" class="tab-content">
                <form onsubmit="handleSignUp(event)">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" name="name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" placeholder="Create a password" required>
                        <p class="password-note">At least 8 characters with uppercase, lowercase, and numbers</p>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" name="confirm" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
                <div class="form-footer">
                    <p>Already have an account? <a onclick="switchTab('login')">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Function to open the account modal
        function openAccountModal() {
            document.getElementById('accountModal').classList.add('active');
        }

        // Function to close the account modal
        function closeAccountModal() {
            document.getElementById('accountModal').classList.remove('active');
        }

        // Close modal when clicking outside the container
        document.getElementById('accountModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAccountModal();
            }
        });

        // Switch between login and signup tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Handle login form submission
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            alert(`Login successful for: ${email}`);
            closeAccountModal();
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
        }

        // Handle sign up form submission
        function handleSignUp(event) {
            event.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            alert(`Account created successfully!\n\nName: ${name}\nEmail: ${email}`);
            closeAccountModal();
            document.getElementById('signup-name').value = '';
            document.getElementById('signup-email').value = '';
            document.getElementById('signup-password').value = '';
            document.getElementById('signup-confirm').value = '';
        }
    </script>
</body>
</html>
